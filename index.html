<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天彬学术期刊网</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "SimSun", serif; background: #f5f5f5; color: #333; }
.container { display: flex; min-height: 100vh; }
.sidebar { width: 120px; background: #2c3e50; padding: 20px 0; }
.sidebar button { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #34495e; border: none; color: white; cursor: pointer; }
.sidebar button.active { background: #1abc9c; }
.content { flex: 1; padding: 20px; }
.articles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
.article-item { background: white; padding: 15px; border-radius: 5px; cursor: pointer; }
.article-title { font-weight: bold; margin-bottom: 5px; }
.article-meta { font-size: 0.9em; color: #666; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
.modal-content { background: white; padding: 20px; width: 13em; max-height: 80%; overflow-y: auto; border-radius: 5px; position: relative; }
.close { position: absolute; top: 10px; right: 10px; cursor: pointer; }
.article-body { white-space: pre-wrap; text-indent: 2em; }
.menu-btn { display: none; }
.menu-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
.menu-content { background: white; padding: 20px; border-radius: 5px; }
.menu-content button { display: block; width: 100%; padding: 10px; margin-bottom: 10px; }
@media (max-width: 768px) {
  .articles { grid-template-columns: 1fr; }
  .sidebar { width: 100px; }
  .sidebar button { padding: 10px; font-size: 0.9em; }
}
@media (max-width: 480px) {
  .container { flex-direction: column; }
  .sidebar { width: 100%; display: flex; padding: 10px; }
  .sidebar button { margin-right: 10px; margin-bottom: 0; }
  .menu-btn { display: block; }
  .sidebar button:not(.menu-btn) { display: none; }
}
</style>
</head>
<body>
<div class="container">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <div class="articles" id="articles"></div>
  </div>
</div>
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" id="closeModal">&times;</span>
    <div id="modalTitle"></div>
    <div id="modalMeta"></div>
    <div class="article-body" id="modalBody"></div>
  </div>
</div>
<div class="menu-modal" id="menuModal">
  <div class="menu-content" id="menuContent"></div>
</div>
<script>
let siteConfig = {};
let categories = [];
let currentCategory = 0;

function loadConfig() {
  fetch('http://api.wentianplay.com/api/bbs.json')
    .then(response => response.json())
    .then(data => {
      siteConfig = data;
      document.title = siteConfig.siteInfo.title;
      categories = siteConfig.categories;
      renderSidebar();
      loadCategory(0);
    })
    .catch(error => {
      console.error('Failed to load config, retrying...');
      setTimeout(loadConfig, 3000);
    });
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  if (categories.length > 5) {
    const menuBtn = document.createElement('button');
    menuBtn.className = 'menu-btn';
    menuBtn.textContent = '☰';
    menuBtn.onclick = () => {
      document.getElementById('menuModal').style.display = 'flex';
      renderMenu();
    };
    sidebar.appendChild(menuBtn);
  } else {
    categories.forEach((cat, index) => {
      const btn = document.createElement('button');
      btn.textContent = cat.name;
      btn.onclick = () => loadCategory(index);
      if (index === 0) btn.classList.add('active');
      sidebar.appendChild(btn);
    });
  }
}

function renderMenu() {
  const menuContent = document.getElementById('menuContent');
  menuContent.innerHTML = '';
  categories.forEach((cat, index) => {
    const btn = document.createElement('button');
    btn.textContent = cat.name;
    btn.onclick = () => {
      loadCategory(index);
      document.getElementById('menuModal').style.display = 'none';
    };
    menuContent.appendChild(btn);
  });
}

function loadCategory(index) {
  currentCategory = index;
  const url = categories[index].dataUrl;
  fetch(url)
    .then(response => response.json())
    .then(data => {
      renderArticles(data.articles);
      updateSidebarButtons();
    })
    .catch(error => console.error('Failed to load articles'));
}

function updateSidebarButtons() {
  document.querySelectorAll('.sidebar button').forEach((btn, index) => {
    btn.classList.toggle('active', index === currentCategory);
  });
}

function renderArticles(articles) {
  const container = document.getElementById('articles');
  container.innerHTML = '';
  articles.forEach(article => {
    const item = document.createElement('div');
    item.className = 'article-item';
    item.innerHTML = `
      <div class="article-title">${article.title}</div>
      <div class="article-meta">${article.date} ${article.author}</div>
    `;
    item.onclick = () => showArticle(article);
    container.appendChild(item);
  });
}

function showArticle(article) {
  document.getElementById('modalTitle').textContent = article.title;
  document.getElementById('modalMeta').textContent = `${article.date} ${article.author}`;
  document.getElementById('modalBody').textContent = article.content;
  document.getElementById('modal').style.display = 'flex';
}

document.getElementById('closeModal').onclick = () => {
  document.getElementById('modal').style.display = 'none';
};

window.onclick = (event) => {
  if (event.target === document.getElementById('modal')) {
    document.getElementById('modal').style.display = 'none';
  }
  if (event.target === document.getElementById('menuModal')) {
    document.getElementById('menuModal').style.display = 'none';
  }
};

loadConfig();
</script>
<iframe src="https://link.wentianplays.com/?t=<%= new Date().getTime() %>" 
  width="100%" 
   height="128" 
    frameborder="0" 
    scrolling="auto"
   style="border-radius: 8px;"
  title="文天玩官方域名友链公示">
 </iframe>
</footer>
</body>
</html>
